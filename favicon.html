<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Favicon Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #ff6b6b, #ffa726);
            color: white;
            text-align: center;
            padding: 40px 20px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .main-content {
            padding: 40px;
        }

        .upload-area {
            border: 3px dashed #ddd;
            border-radius: 15px;
            padding: 60px 20px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            background: #fafafa;
        }

        .upload-area:hover {
            border-color: #667eea;
            background: #f0f4ff;
            transform: translateY(-2px);
        }

        .upload-area.dragover {
            border-color: #667eea;
            background: #f0f4ff;
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 4em;
            color: #ddd;
            margin-bottom: 20px;
        }

        .upload-text {
            font-size: 1.2em;
            color: #666;
            margin-bottom: 20px;
        }

        .file-input {
            display: none;
        }

        .upload-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 1.1em;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .upload-btn:hover {
            transform: translateY(-2px);
        }

        .preview-section {
            display: none;
            margin-top: 40px;
        }

        .preview-image {
            max-width: 200px;
            max-height: 200px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            margin: 20px auto;
            display: block;
        }

        .generate-btn {
            background: linear-gradient(135deg, #ff6b6b, #ffa726);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 25px;
            font-size: 1.2em;
            cursor: pointer;
            display: block;
            margin: 20px auto;
            transition: transform 0.2s;
        }

        .generate-btn:hover {
            transform: translateY(-2px);
        }

        .generate-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .results-section {
            display: none;
            margin-top: 40px;
        }

        .size-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .size-item {
            text-align: center;
            padding: 20px;
            border-radius: 15px;
            background: #f8f9fa;
            transition: transform 0.2s;
        }

        .size-item:hover {
            transform: translateY(-2px);
        }

        .size-preview {
            width: 64px;
            height: 64px;
            margin: 0 auto 15px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .size-label {
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
        }

        .download-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 0.9em;
            transition: background 0.2s;
        }

        .download-btn:hover {
            background: #218838;
        }

        .download-all-btn {
            background: linear-gradient(135deg, #28a745, #20c997);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 25px;
            font-size: 1.2em;
            cursor: pointer;
            display: block;
            margin: 30px auto;
            transition: transform 0.2s;
        }

        .download-all-btn:hover {
            transform: translateY(-2px);
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #eee;
            border-radius: 3px;
            overflow: hidden;
            margin: 20px 0;
            display: none;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s ease;
        }

        .loading {
            text-align: center;
            margin: 20px 0;
            display: none;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .html-code {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-top: 30px;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 0.9em;
            overflow-x: auto;
        }

        .copy-btn {
            background: #6c757d;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            float: right;
            margin-bottom: 10px;
        }

        .copy-btn:hover {
            background: #5a6268;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎨 Favicon Generator</h1>
            <p>Generate all favicon sizes from your image instantly</p>
        </div>

        <div class="main-content">
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📁</div>
                <div class="upload-text">Drag & drop your image here or click to browse</div>
                <button class="upload-btn" onclick="document.getElementById('fileInput').click()">
                    Choose Image
                </button>
                <input type="file" id="fileInput" class="file-input" accept="image/*">
            </div>

            <div class="preview-section" id="previewSection">
                <h3 style="text-align: center; margin-bottom: 20px;">Preview</h3>
                <img id="previewImage" class="preview-image" alt="Preview">
                <button class="generate-btn" id="generateBtn">Generate Favicons</button>
                
                <div class="progress-bar" id="progressBar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                
                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <p>Generating favicons...</p>
                </div>
            </div>

            <div class="results-section" id="resultsSection">
                <h3 style="text-align: center; margin-bottom: 20px;">Generated Favicons</h3>
                <div class="size-grid" id="sizeGrid"></div>
                <button class="download-all-btn" id="downloadAllBtn">Download All as ZIP</button>
                
                <div class="html-code">
                    <button class="copy-btn" onclick="copyHtmlCode()">Copy</button>
                    <h4>HTML Code for your website:</h4>
                    <pre id="htmlCode"></pre>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script>
        const faviconSizes = [
            { size: 16, name: 'favicon-16x16.png', description: 'Browser tab' },
            { size: 32, name: 'favicon-32x32.png', description: 'Browser bookmark' },
            { size: 57, name: 'apple-icon-57x57.png', description: 'iOS home screen' },
            { size: 72, name: 'apple-icon-72x72.png', description: 'iPad home screen' },
            { size: 76, name: 'apple-icon-76x76.png', description: 'iPad home screen' },
            { size: 114, name: 'apple-icon-114x114.png', description: 'iPhone retina' },
            { size: 120, name: 'apple-icon-120x120.png', description: 'iPhone retina' },
            { size: 144, name: 'apple-icon-144x144.png', description: 'iPad retina' },
            { size: 152, name: 'apple-icon-152x152.png', description: 'iPad retina' },
            { size: 180, name: 'apple-touch-icon.png', description: 'iOS touch icon' },
            { size: 192, name: 'android-chrome-192x192.png', description: 'Android home screen' },
            { size: 512, name: 'android-chrome-512x512.png', description: 'Android splash screen' }
        ];

        let originalImage = null;
        let generatedImages = {};

        // File input handling
        const fileInput = document.getElementById('fileInput');
        const uploadArea = document.getElementById('uploadArea');
        const previewSection = document.getElementById('previewSection');
        const previewImage = document.getElementById('previewImage');
        const generateBtn = document.getElementById('generateBtn');

        // Drag and drop handlers
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });

        uploadArea.addEventListener('click', () => {
            fileInput.click();
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        function handleFile(file) {
            if (!file.type.startsWith('image/')) {
                alert('Please select an image file');
                return;
            }

            const reader = new FileReader();
            reader.onload = (e) => {
                originalImage = new Image();
                originalImage.onload = () => {
                    previewImage.src = e.target.result;
                    previewSection.style.display = 'block';
                    document.getElementById('resultsSection').style.display = 'none';
                };
                originalImage.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        generateBtn.addEventListener('click', generateFavicons);

        async function generateFavicons() {
            if (!originalImage) return;

            generateBtn.disabled = true;
            document.getElementById('loading').style.display = 'block';
            document.getElementById('progressBar').style.display = 'block';
            
            generatedImages = {};
            let completed = 0;
            const total = faviconSizes.length;

            for (const favicon of faviconSizes) {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                
                canvas.width = favicon.size;
                canvas.height = favicon.size;
                
                // Draw the resized image
                ctx.drawImage(originalImage, 0, 0, favicon.size, favicon.size);
                
                // Convert to blob
                canvas.toBlob((blob) => {
                    generatedImages[favicon.name] = {
                        blob: blob,
                        url: URL.createObjectURL(blob),
                        size: favicon.size,
                        description: favicon.description
                    };
                    
                    completed++;
                    const progress = (completed / total) * 100;
                    document.getElementById('progressFill').style.width = progress + '%';
                    
                    if (completed === total) {
                        displayResults();
                    }
                }, 'image/png');
            }
        }

        function displayResults() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('progressBar').style.display = 'none';
            document.getElementById('resultsSection').style.display = 'block';
            generateBtn.disabled = false;

            const sizeGrid = document.getElementById('sizeGrid');
            sizeGrid.innerHTML = '';

            Object.entries(generatedImages).forEach(([name, data]) => {
                const item = document.createElement('div');
                item.className = 'size-item';
                
                item.innerHTML = `
                    <div class="size-preview">
                        <img src="${data.url}" style="max-width: 100%; max-height: 100%;" alt="${data.size}x${data.size}">
                    </div>
                    <div class="size-label">${data.size}×${data.size}</div>
                    <div style="font-size: 0.8em; color: #666; margin-bottom: 10px;">${data.description}</div>
                    <button class="download-btn" onclick="downloadImage('${name}')">Download</button>
                `;
                
                sizeGrid.appendChild(item);
            });

            generateHtmlCode();
        }

        function downloadImage(name) {
            const data = generatedImages[name];
            if (!data) return;

            const link = document.createElement('a');
            link.href = data.url;
            link.download = name;
            link.click();
        }

        document.getElementById('downloadAllBtn').addEventListener('click', downloadAllAsZip);

        async function downloadAllAsZip() {
            const zip = new JSZip();
            
            // Add all favicon files to zip
            Object.entries(generatedImages).forEach(([name, data]) => {
                zip.file(name, data.blob);
            });
            
            // Generate and download zip
            const zipBlob = await zip.generateAsync({ type: 'blob' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(zipBlob);
            link.download = 'favicons.zip';
            link.click();
        }

        function generateHtmlCode() {
            const htmlCode = `<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="/android-chrome-192x192.png">
<link rel="icon" type="image/png" sizes="512x512" href="/android-chrome-512x512.png">
<meta name="theme-color" content="#ffffff">`;

            document.getElementById('htmlCode').textContent = htmlCode;
        }

        function copyHtmlCode() {
            const htmlCode = document.getElementById('htmlCode').textContent;
            navigator.clipboard.writeText(htmlCode).then(() => {
                const btn = event.target;
                const originalText = btn.textContent;
                btn.textContent = 'Copied!';
                setTimeout(() => {
                    btn.textContent = originalText;
                }, 2000);
            });
        }
    </script>
</body>
</html>
